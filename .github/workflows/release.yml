name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run release:check -- "${GITHUB_REF_NAME}"
      - run: npm test
      - run: npm run pack:check
      - run: npm run publish:dry-run
      - id: notes
        run: echo "file=$(node compiler/release-notes.mjs "${GITHUB_REF_NAME}")" >> "$GITHUB_OUTPUT"
      - run: gh release create "${GITHUB_REF_NAME}" --title "OscarUI ${GITHUB_REF_NAME}" --notes-file "${{ steps.notes.outputs.file }}"
        env:
          GH_TOKEN: ${{ github.token }}
