component: ProjectCard

props:
  - name: title
    type: string
  - name: subtitle
    type: string
  - name: onSelect
    type: action

body:
  - type: column
    spacing: tight
    padding: normal
    align: start
    children:
      - type: text
        role: heading
        bind: title
      - type: text
        role: caption
        bind: subtitle
        color: textSecondary
      - type: button
        role: ghost
        label: Open
        action: onSelect
